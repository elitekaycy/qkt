name: release

# Builds the distribution tarball and attaches it to the GitHub release on every
# `v*` tag push. Pairs with docker.yml (publishes the container image to GHCR)
# and scripts/install.sh (downloads the tarball from the release).
#
# Security: all `${{ ... }}` template expressions reference either secrets,
# internal step outputs, or `github.ref_name` (a git tag — controlled by repo
# admins via the tag-push gate). No untrusted user input is interpolated into
# shell commands. Every external value is passed via `env:` and dereferenced
# with shell quoting. See
# https://github.blog/security/vulnerability-research/how-to-catch-github-actions-workflow-injections-before-attackers-do/

on:
  push:
    tags: ['v*']

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-attach:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build VSCode extension (.vsix) into editor/vscode/
        working-directory: editor/vscode
        run: npx --yes @vscode/vsce@latest package --no-dependencies

      - name: Build distribution tarball
        run: ./gradlew --no-daemon distTar

      - name: Verify tarball contains the bundled .vsix
        run: |
          set -e
          path=$(ls build/distributions/qkt-*.tar | head -1)
          tar -tf "$path" | grep -qE 'share/editor/vscode/qkt-[0-9].*\.vsix$' \
            || { echo "::error::tarball missing share/editor/vscode/*.vsix"; exit 1; }

      - name: Identify tarball path
        id: tar
        run: |
          set -e
          path=$(ls build/distributions/qkt-*.tar | head -1)
          if [ -z "$path" ] || [ ! -f "$path" ]; then
            echo "::error::no tarball found in build/distributions/"
            exit 1
          fi
          echo "path=$path" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$path")" >> "$GITHUB_OUTPUT"

      - name: Verify tarball has bin/qkt
        env:
          TAR_PATH: ${{ steps.tar.outputs.path }}
        run: |
          set -e
          tar -tf "$TAR_PATH" | grep -q '/bin/qkt$' \
            || { echo "::error::tarball missing bin/qkt"; exit 1; }

      - name: Upload to GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          TAR_PATH: ${{ steps.tar.outputs.path }}
        run: |
          set -e
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "release $TAG exists; attaching tarball"
            gh release upload "$TAG" "$TAR_PATH" --clobber
          else
            echo "release $TAG does not exist; creating draft"
            gh release create "$TAG" "$TAR_PATH" \
              --draft \
              --title "$TAG" \
              --notes "Draft release. Fill in notes before publishing. Tarball attached."
          fi
