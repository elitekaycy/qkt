name: check

# Fast essentials — compile + ktlint + unit tests — on every PR into dev and
# every push to dev. This is the only CI a feature-branch PR runs. The heavier
# black-box suite is integration.yml, which gates testing and main.
#
# On a push to dev (i.e. a merged PR), a green build auto-promotes dev to
# testing via a fast-forward push. The push authenticates with PROMOTE_SSH_KEY
# (a repo-scoped deploy key) rather than GITHUB_TOKEN, because a GITHUB_TOKEN
# push does not trigger downstream workflows — integration.yml must fire on
# testing.
#
# Template expressions reference internal context only (github.event_name,
# github.ref); no untrusted event input reaches a shell command. The promotion
# push uses the built-in $GITHUB_SHA env var.

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

concurrency:
  group: check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - name: Build + test + ktlint
        run: ./gradlew build --no-daemon
      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            build/reports/tests/
            build/test-results/
          retention-days: 7

  promote-to-testing:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.PROMOTE_SSH_KEY }}
      - name: Fast-forward testing to dev
        run: git push origin "$GITHUB_SHA:refs/heads/testing"
