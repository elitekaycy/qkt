name: editor

# Lints and smoke-packages the editor integrations (textmate grammar, vscode
# extension, future neovim plugin). Path-filtered so it only runs when
# editor/** or this workflow itself changes. The fast essentials (check.yml)
# still run on every PR to dev independently of this file.
#
# Template expressions reference internal context only (github.ref); no
# untrusted event input reaches a shell command.

on:
  push:
    branches: [dev]
    paths:
      - 'editor/**'
      - '.github/workflows/editor.yml'
  pull_request:
    branches: [dev]
    paths:
      - 'editor/**'
      - '.github/workflows/editor.yml'

concurrency:
  group: editor-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate JSON
        run: |
          set -e
          for f in \
            editor/textmate/qkt.tmLanguage.json \
            editor/vscode/package.json \
            editor/vscode/language-configuration.json \
            editor/vscode/snippets/qkt.json \
            editor/vscode/syntaxes/qkt.tmLanguage.json; do
            echo "::group::$f"
            jq . "$f" >/dev/null
            echo "::endgroup::"
          done

      - name: Guard against textmate -> vscode grammar drift
        run: |
          if ! diff -q editor/textmate/qkt.tmLanguage.json editor/vscode/syntaxes/qkt.tmLanguage.json; then
            echo "::error::editor/vscode/syntaxes/qkt.tmLanguage.json drifted from editor/textmate/qkt.tmLanguage.json"
            echo "Run 'npm run sync-grammar' from editor/vscode/ to fix."
            diff editor/textmate/qkt.tmLanguage.json editor/vscode/syntaxes/qkt.tmLanguage.json || true
            exit 1
          fi

      - name: vsce package smoke
        working-directory: editor/vscode
        run: npx --yes @vscode/vsce@latest package --no-dependencies

      - name: Install vim for nvim plugin smoke
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends vim-nox

      - name: vim syntax smoke against example fixture
        run: |
          # Load the three plugin files against the fixture in a clean vim
          # environment. Any vimscript syntax error in the syntax file aborts
          # with a non-zero exit; vim is otherwise silent in -es mode.
          set -e
          vim -u NONE -N -e -s \
            -c 'set rtp+=editor/nvim' \
            -c 'filetype on' \
            -c 'syntax enable' \
            -c 'edit editor/nvim/test/example.qkt' \
            -c 'filetype detect' \
            -c 'syntax sync fromstart' \
            -c 'redir => g:ft | silent set filetype? | redir END' \
            -c 'if g:ft !~# "filetype=qkt" | echoerr "expected filetype=qkt, got" g:ft | cquit | endif' \
            -c 'qall!'
