name: docker

on:
  push:
    branches: [main, testing]
    tags: ['v*']

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/qkt
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
      # Runtime image: `:latest` on a main push, `:vX.Y.Z` on a version tag.
      - name: build and push runtime image
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
        uses: docker/build-push-action@v5
        with:
          context: .
          target: runtime
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      # Developer image (`:dev`) — runtime + editor + shell, for authoring and
      # testing strategies inside a container. Mutable tag, rebuilt on every main
      # push (like `:latest`); not published on version tags.
      - name: build and push dev image
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: .
          target: dev
          platforms: linux/amd64
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/qkt:dev
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      # Edge image (`:edge`) — the runtime built from the `testing` branch, which is
      # auto-fast-forwarded from `dev` and has passed the integration CI. Lets downstream
      # automation consume integration-tested capabilities without waiting for the manual
      # promotion to `main`. Mutable tag, rebuilt on every testing push; not on tags or main.
      - name: build and push edge image
        if: github.ref == 'refs/heads/testing'
        uses: docker/build-push-action@v5
        with:
          context: .
          target: runtime
          platforms: linux/amd64
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/qkt:edge
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
