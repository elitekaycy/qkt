site_name: qkt
site_description: An event-driven trading engine in Kotlin with backtest replay, parameter sweeps, attribution-aware risk, and a SQL-like DSL.
site_url: https://elitekaycy.github.io/qkt/
repo_url: https://github.com/elitekaycy/qkt
repo_name: elitekaycy/qkt
edit_uri: edit/main/docs/
copyright: Copyright &copy; 2026 elitekaycy

docs_dir: docs
site_dir: site

exclude_docs: |
  superpowers/
  phase4-backlog.md
  assets/INTEGRATION.md

not_in_nav: |
  logging.md
  memory-audit.md
  release-process.md

theme:
  name: material
  custom_dir: overrides
  logo: assets/qkt-mark-light.svg
  favicon: assets/favicon.svg
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  font: false
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - toc.follow
    - search.highlight
    - search.share
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil

extra_css:
  - assets/extra.css

plugins:
  - search
  - mermaid2:
      version: 10.9.0
      arguments:
        theme: 'dark'
        themeVariables:
          background: '#0a0a0c'
          primaryColor: '#16161a'
          primaryTextColor: '#e8e6e1'
          primaryBorderColor: '#3a3833'
          lineColor: '#9a958c'
          secondaryColor: '#25241f'
          tertiaryColor: '#16161a'
          fontFamily: 'JetBrains Mono, monospace'

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid_custom
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.details
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

