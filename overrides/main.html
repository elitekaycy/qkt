{% extends "base.html" %}

{#-
  qkt docs — main override
  Injects the Fraunces + Source Serif 4 web fonts so we control typography
  fully. Material's `font: false` in mkdocs.yml disables the default CDN.
-#}

{% block extrahead %}
  {{ super() }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT@0,9..144,300..700,0..100;1,9..144,300..700,0..100&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,500&family=JetBrains+Mono:ital,wght@0,400..700;1,400..600&display=swap"
  >
  <meta name="theme-color" content="#0e0e10">

  <link rel="apple-touch-icon" sizes="180x180" href="{{ base_url }}/assets/apple-touch-icon.png">

  <meta property="og:type" content="website">
  <meta property="og:title" content="qkt — event-driven trading engine in Kotlin">
  <meta property="og:description" content="Backtest replay, parameter sweeps, attribution-aware risk, and a SQL-like DSL.">
  <meta property="og:image" content="https://elitekaycy.github.io/qkt/assets/og-image.png">
  <meta property="og:url" content="https://elitekaycy.github.io/qkt/">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://elitekaycy.github.io/qkt/assets/og-image.png">
{% endblock %}
